kind = "video"
previewPath = "/launchpad-video/"
title = "Startup Launchpad 60-Second Trailer"
version = "1.0.0"
id = "artifacts/launchpad-video"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/launchpad-video/" ]
localPort = 25766

[services.development]
run = "pnpm --filter @workspace/launchpad-video run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/launchpad-video", "run", "build" ]
publicDir = "artifacts/launchpad-video/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25766"
BASE_PATH = "/launchpad-video/"
